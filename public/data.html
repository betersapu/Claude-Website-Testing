<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data – Pickleball ELO</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav>
    <a href="/" class="logo">🏓 Pickleball ELO</a>
    <a href="/">Rankings</a>
    <a href="/data.html" class="active">Data</a>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Data</h1>
      <p>View and edit all player stats and match history</p>
    </div>

    <div class="card" style="margin-bottom:1.5rem">
      <h3>Players</h3>
      <div id="players-table">
        <p class="loading">Loading…</p>
      </div>
    </div>

    <div class="card">
      <h3>Match History</h3>
      <div id="matches-table">
        <p class="loading">Loading…</p>
      </div>
    </div>
  </div>

  <!-- Edit player modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal" style="max-width:420px">
      <h3 style="margin-bottom:1.25rem;font-size:1rem">Edit Player</h3>
      <form id="edit-form">
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="edit-name" required />
        </div>
        <div class="form-group">
          <label>Rating</label>
          <input type="number" id="edit-rating" step="0.1" required />
        </div>
        <div class="grid-2" style="gap:0.75rem">
          <div class="form-group">
            <label>Wins</label>
            <input type="number" id="edit-wins" min="0" required />
          </div>
          <div class="form-group">
            <label>Losses</label>
            <input type="number" id="edit-losses" min="0" required />
          </div>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary" id="edit-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm delete modal -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal">
      <p id="modal-msg"></p>
      <div style="display:flex;gap:0.75rem;margin-top:1.25rem">
        <button class="btn btn-danger" id="modal-confirm">Delete</button>
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="data.js"></script>
</body>
</html>
